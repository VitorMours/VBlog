{% if messages %}
    {% for message in messages %}
        {% if message.level == 40 %}
            <div class="bg-red-300 shadow-md rounded-md font-bold p-3 mb-3">
        {% elif message.level == 30 %}
            <div class="bg-yellow-300 shadow-md rounded-md font-bold p-3 mb-3">
        {% elif message.level == 25 %}
            <div class="bg-green-300 shadow-md rounded-md font-bold p-3 mb-3">
        {% elif message.level == 20 %}
            <div class="bg-blue-300 shadow-md rounded-md font-bold p-3 mb-3">
        {% elif message.level == 10 %}
            <div class="bg-purple-300 shadow-md rounded-md font-bold p-3 mb-3">
        {% endif %}
            {{ message }}
        </div>
    {% endfor %}
{% endif %}
